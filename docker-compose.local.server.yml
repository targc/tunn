services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "6060:6060"
      - "6061:6061"
    environment:
      - TUNN_AGENT_TOKEN=${TUNN_AGENT_TOKEN}
      - TUNN_DATABASE_URL=postgres://tunn:tunn@db:5432/tunn?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=tunn
      - POSTGRES_PASSWORD=tunn
      - POSTGRES_DB=tunn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunn"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
